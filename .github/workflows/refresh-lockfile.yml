name: Refresh Lockfile

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: refresh-lockfile-master
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # 10 min for the refresh itself + up to ~30 min polling for auto-merge
    # (see "Wait for auto-merge" step below).
    timeout-minutes: 40
    permissions:
      contents: write
      pull-requests: write
      # Needed to force-trigger docker.yml via workflow_dispatch once this
      # workflow's own auto-merge lands (see below).
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Refresh pnpm lockfile
        run: pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile

      - name: Fail on unexpected file changes
        run: |
          changed="$(git status --porcelain)"
          if [ -z "$changed" ]; then
            echo "Lockfile is already up to date."
            exit 0
          fi
          if printf '%s\n' "$changed" | grep -Fvq ' pnpm-lock.yaml'; then
            echo "Unexpected files changed during lockfile refresh:"
            echo "$changed"
            exit 1
          fi

      - name: Create or update pull request
        id: upsert-pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile unchanged, nothing to do."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="chore/refresh-lockfile"
          git config user.name "lockfile-bot"
          git config user.email "lockfile-bot@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add pnpm-lock.yaml
          git commit -m "chore(lockfile): refresh pnpm-lock.yaml"
          git push --force origin "$BRANCH"

          # Only reuse an open PR from this repository owner, not a fork with the same branch name.
          pr_url="$(
            gh pr list --state open --head "$BRANCH" --json url,headRepositoryOwner \
              --jq ".[] | select(.headRepositoryOwner.login == \"$REPO_OWNER\") | .url" |
            head -n 1
          )"
          if [ -z "$pr_url" ]; then
            pr_url="$(gh pr create \
              --head "$BRANCH" \
              --title "chore(lockfile): refresh pnpm-lock.yaml" \
              --body "Auto-generated lockfile refresh after dependencies changed on master. This PR only updates pnpm-lock.yaml.")"
            echo "Created new PR: $pr_url"
          else
            echo "PR already exists: $pr_url"
          fi
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for lockfile PR
        if: steps.upsert-pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge --auto --squash --delete-branch "${{ steps.upsert-pr.outputs.pr_url }}"

      - name: Wait for auto-merge and trigger image build
        if: steps.upsert-pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ steps.upsert-pr.outputs.pr_url }}
        run: |
          # The merge above lands as github-actions[bot] using GITHUB_TOKEN.
          # GitHub does not fire push-triggered workflow runs (docker.yml's
          # `on: push`) for commits pushed with GITHUB_TOKEN -- this is an
          # anti-recursion protection, and it is why the #263 lockfile merge
          # (2026-07-18) left main unbuilt even though the push landed cleanly.
          # workflow_dispatch is explicitly exempt from that restriction, so we
          # poll for the merge and force-trigger the build ourselves once it lands.
          for _ in $(seq 1 90); do
            state="$(gh pr view "$PR_URL" --json state --jq .state)"
            if [ "$state" = "MERGED" ]; then
              base="$(gh pr view "$PR_URL" --json baseRefName --jq .baseRefName)"
              echo "PR merged into $base; triggering docker.yml"
              gh workflow run docker.yml --ref "$base"
              exit 0
            fi
            if [ "$state" = "CLOSED" ]; then
              echo "PR closed without merging; nothing to build."
              exit 0
            fi
            sleep 20
          done
          echo "Timed out waiting for auto-merge (no required checks should normally cause this); trigger docker.yml manually if the PR later merges." >&2
          exit 1
